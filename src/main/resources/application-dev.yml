spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ironsync_3d?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  type-handlers-package: com.ironsync.common.handler
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

ironsync:
  mcp:
    diary-path: ./data/notes
  test-reports-path: deploy/test-reports
  mesh:
    mappings:
      - action: 杠铃深蹲
        meshes: [Quad_L, Quad_R, Glute_L, Glute_R]
      - action: 罗马尼亚硬拉
        meshes: [Hamstring_L, Hamstring_R, LowerBack]
      - action: 卧推
        meshes: [Pectoral_M_L, Pectoral_M_R, Tricep_L, Tricep_R]
      - action: 推举
        meshes: [Deltoid_A_L, Deltoid_A_R, Tricep_L, Tricep_R]
      - action: 引体向上
        meshes: [Lat_Dorsi_L, Lat_Dorsi_R, Bicep_L, Bicep_R]
