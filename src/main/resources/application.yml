server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ironsync_3d?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ironsync.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# MCP 本地日记目录配置（根据实际路径修改）
ironsync:
  mcp:
    diary-path: /home/user/notes
