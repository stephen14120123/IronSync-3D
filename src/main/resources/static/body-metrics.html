<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身体指标 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/body-metrics.css">
    <script src="js/echarts.min.js"></script>
</head>
<body>
    <div id="glass-bg-orb"></div>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> <small class="logo-dot">⏺</small></div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html">训练</a>
            <a href="/body-metrics.html" class="active">指标</a>
            <a href="/diet-mood.html">饮食</a>
            <a href="/supplements.html">补剂</a>
        </nav>
        <div class="nav-right">
            <span class="nav-user" id="navUser">—</span>
            <button class="btn-logout" id="btnLogout" title="退出登录">↩ 退出</button>
        </div>
    </div>

    <div class="page-container">
        <div class="stat-row" id="metricsStatRow">
            <div class="stat-block block-total">
                <span class="num" id="ms-latestWeight">--</span>
                <span class="label">最新体重</span>
                <span class="sub" id="ms-weightDelta">--</span>
            </div>
            <div class="stat-block block-pass">
                <span class="num" id="ms-latestBodyfat">--</span>
                <span class="label">最新体脂</span>
                <span class="sub" id="ms-bodyfatDelta">--</span>
            </div>
            <div class="stat-block block-time">
                <span class="num" id="ms-totalRecords">--</span>
                <span class="label">记录天数</span>
                <span class="sub" id="ms-dateRange">--</span>
            </div>
            <div class="stat-block block-amber">
                <span class="num" id="ms-weightChange">--</span>
                <span class="label">体重变化</span>
                <span class="sub">较 7 天前</span>
            </div>
        </div>

        <div id="chart-container">
            <div id="bodyMetricsChart"></div>
        </div>

        <div class="content-grid">
            <div class="form-panel">
                <h3>录入身体指标</h3>
                <form id="metricsForm">
                    <label>日期
                        <input type="date" name="recordDate" required>
                    </label>
                    <label>体重 (kg)
                        <input type="number" name="weightKg" step="0.1" min="20" max="300" required>
                    </label>
                    <label>体脂率 (%)
                        <input type="number" name="bodyFatPercentage" step="0.1" min="3" max="60">
                    </label>
                    <label>备注
                        <input type="text" name="note" maxlength="500">
                    </label>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="metricsSubmitBtn">保存</button>
                        <button type="button" class="btn btn-ghost" id="metricsCancelBtn" style="display:none" onclick="cancelEdit()">取消编辑</button>
                    </div>
                </form>
            </div>

            <div class="history-panel">
                <h3>历史数据</h3>
                <div class="table-wrap">
                    <table id="metricsTable">
                        <thead>
                            <tr><th>日期</th><th>体重</th><th>体脂率</th><th>备注</th><th>操作</th></tr>
                        </thead>
                        <tbody id="metricsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/body-metrics.js"></script>
</body>
</html>
