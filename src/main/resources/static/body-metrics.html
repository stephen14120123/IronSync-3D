<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身体指标 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/body-metrics.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
</head>
<body>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> 3D</div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html">训练记录</a>
            <a href="/supplements.html">补剂管家</a>
            <a href="/diet-mood.html">饮食情绪</a>
            <a href="/body-metrics.html" class="active">身体指标</a>
            <a href="/mcp-search.html">日记检索</a>
            <a href="/test-report.html">测试报告</a>
        </nav>
    </div>

    <div class="page-container">
        <div id="chart-container">
            <div id="bodyMetricsChart"></div>
        </div>

        <div class="content-grid">
            <div class="form-panel">
                <h3>录入身体指标</h3>
                <form id="metricsForm">
                    <label>日期
                        <input type="date" name="recordDate" required>
                    </label>
                    <label>体重 (kg)
                        <input type="number" name="weightKg" step="0.1" min="20" max="300" required>
                    </label>
                    <label>体脂率 (%)
                        <input type="number" name="bodyFatPercentage" step="0.1" min="3" max="60">
                    </label>
                    <label>备注
                        <input type="text" name="note" maxlength="500">
                    </label>
                    <button type="submit">保存</button>
                </form>
            </div>

            <div class="history-panel">
                <h3>历史数据</h3>
                <div class="table-wrap">
                    <table id="metricsTable">
                        <thead>
                            <tr><th>日期</th><th>体重</th><th>体脂率</th><th>备注</th><th>操作</th></tr>
                        </thead>
                        <tbody id="metricsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/body-metrics.js"></script>
</body>
</html>
