<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饮食情绪 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/diet-mood.css">
    <script src="js/echarts.min.js"></script>
</head>
<body>
    <div id="glass-bg-orb"></div>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> <small class="logo-dot">⏺</small></div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html">训练</a>
            <a href="/body-metrics.html">指标</a>
            <a href="/diet-mood.html" class="active">饮食</a>
            <a href="/supplements.html">补剂</a>
        </nav>
        <div class="nav-right">
            <span class="nav-user" id="navUser">—</span>
            <button class="btn-logout" id="btnLogout" title="退出登录">↩ 退出</button>
        </div>
    </div>

    <div class="page-container">
        <div class="stat-row" id="dietStatRow">
            <div class="stat-block block-amber">
                <span class="num" id="ds-carbs">--</span>
                <span class="label">今日碳水</span>
                <span class="sub">g</span>
            </div>
            <div class="stat-block block-pass">
                <span class="num" id="ds-protein">--</span>
                <span class="label">今日蛋白质</span>
                <span class="sub">g</span>
            </div>
            <div class="stat-block block-time">
                <span class="num" id="ds-fat">--</span>
                <span class="label">今日脂肪</span>
                <span class="sub">g</span>
            </div>
            <div class="stat-block block-total">
                <span class="num" id="ds-total">--</span>
                <span class="label">今日总计</span>
                <span class="sub">g</span>
            </div>
        </div>

        <div id="chart-container">
            <div id="dietMoodChart"></div>
        </div>

        <div class="content-grid">
            <div class="form-panel">
                <h3>录入饮食与情绪</h3>
                <form id="dietForm">
                    <label>日期
                        <input type="date" name="recordDate" required>
                    </label>
                    <label>碳水 (g)
                        <input type="number" name="carbsG" step="0.1" min="0" required>
                    </label>
                    <label>蛋白质 (g)
                        <input type="number" name="proteinG" step="0.1" min="0" required>
                    </label>
                    <label>脂肪 (g)
                        <input type="number" name="fatG" step="0.1" min="0" required>
                    </label>
                    <label>备注
                        <input type="text" name="note" maxlength="500">
                    </label>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="dietSubmitBtn">保存</button>
                        <button type="button" class="btn btn-ghost" id="dietCancelBtn" style="display:none" onclick="cancelEdit()">取消编辑</button>
                    </div>
                </form>
            </div>

            <div class="history-panel">
                <h3>历史记录</h3>
                <div class="table-wrap">
                    <table id="dietTable">
                        <thead>
                            <tr><th>日期</th><th>碳水</th><th>蛋白质</th><th>脂肪</th><th>备注</th><th>操作</th></tr>
                        </thead>
                        <tbody id="dietBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/diet-mood.js"></script>
</body>
</html>
