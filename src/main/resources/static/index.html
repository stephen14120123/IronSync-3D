<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronSync-3D 智能健身看板</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> 3D</div>
        <nav>
            <a href="/" class="active">仪表盘</a>
            <a href="/training.html">训练记录</a>
            <a href="/supplements.html">补剂管家</a>
            <a href="/diet-mood.html">饮食情绪</a>
            <a href="/body-metrics.html">身体指标</a>
            <a href="/mcp-search.html">日记检索</a>
            <a href="/test-report.html">测试报告</a>
        </nav>
    </div>

    <div id="three-canvas-container"></div>

    <div class="glass-card left">
        <h3>今日训练概览</h3>
        <div class="stat-item">
            <span>动作数</span>
            <span class="stat-value" id="stat-exercises">--</span>
        </div>
        <div class="stat-item">
            <span>总组数</span>
            <span class="stat-value" id="stat-sets">--</span>
        </div>
        <div class="stat-item">
            <span>平均 RPE</span>
            <span class="stat-value" id="stat-rpe">--</span>
        </div>
    </div>

    <div class="glass-card right">
        <h3>热量消耗</h3>
        <div style="position:relative;display:flex;justify-content:center;">
            <div class="ring-progress">
                <svg viewBox="0 0 120 120">
                    <circle class="bg" cx="60" cy="60" r="50"/>
                    <circle class="fg" cx="60" cy="60" r="50"
                        id="cal-ring" stroke-dasharray="314.16" stroke-dashoffset="314.16"/>
                </svg>
                <div class="center-label">
                    <span id="cal-current">0</span>
                    <small>kcal</small>
                </div>
            </div>
        </div>
        <div class="stat-item">
            <span>目标</span>
            <span class="stat-value" id="cal-target">600 kcal</span>
        </div>
    </div>

    <div id="hint-overlay">拖拽旋转 · 滚轮缩放</div>

    <script src="js/api.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
