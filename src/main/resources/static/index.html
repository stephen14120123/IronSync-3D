<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronSync-3D 智能健身看板</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">

</head>
<body>
    <!-- Floating neon background orb (required by glassmorphism global.css) -->
    <div id="glass-bg-orb"></div>

    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> 3D</div>
        <nav>
            <a href="/" class="active">仪表盘</a>
            <a href="/training.html">训练记录</a>
            <a href="/supplements.html">补剂管家</a>
            <a href="/diet-mood.html">饮食情绪</a>
            <a href="/body-metrics.html">身体指标</a>
            <a href="/mcp-search.html">日记检索</a>
            <a href="/test-report.html">测试报告</a>
        </nav>
    </div>

    <div id="body-svg-overlay" class="tech-body-container">
        <svg viewBox="0 0 200 350" xmlns="http://www.w3.org/2000/svg" class="tech-body-svg">
            <defs>
                <!-- Top-left light source gradient: lighter top-left, darker bottom-right -->
                <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4a4d5e" />
                    <stop offset="100%" stop-color="#1e2028" />
                </linearGradient>
                <linearGradient id="hover-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#5599ff" />
                    <stop offset="100%" stop-color="#2244aa" />
                </linearGradient>
                <linearGradient id="active-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00ff88" />
                    <stop offset="100%" stop-color="#008855" />
                </linearGradient>
            </defs>
            <rect x="85" y="20" width="30" height="35" rx="8" data-mesh="Head" class="muscle-part" fill="url(#metal-grad)" />
            <polygon points="90,58 110,58 105,70 95,70" class="muscle-part core-frame" fill="url(#metal-grad)" />
            <polygon points="98,75 50,75 60,120 98,130" data-mesh="Chest" class="muscle-part" fill="url(#metal-grad)" />
            <polygon points="102,75 150,75 140,120 102,130" data-mesh="Chest" class="muscle-part" fill="url(#metal-grad)" />
            <polygon points="62,125 138,125 125,200 75,200" data-mesh="Abdominal" class="muscle-part" fill="url(#metal-grad)" />
            <polygon points="45,75 20,150 35,155 55,120" data-mesh="LeftArm" class="muscle-part" fill="url(#metal-grad)" />
            <polygon points="155,75 180,150 165,155 145,120" data-mesh="RightArm" class="muscle-part" fill="url(#metal-grad)" />
            <polygon points="70,205 40,320 65,320 95,215" data-mesh="Quad_L" class="muscle-part" fill="url(#metal-grad)" />
            <polygon points="130,205 160,320 135,320 105,215" data-mesh="Quad_R" class="muscle-part" fill="url(#metal-grad)" />
            <line x1="100" y1="75" x2="100" y2="200" stroke="#333" stroke-width="2" pointer-events="none" />
        </svg>
    </div>

    <div class="glass-card left">
        <div class="card-title">今日训练概览</div>
        <div class="stat-row">
            <span class="stat-label">动作数</span>
            <span class="stat-value" id="stat-exercises">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">总组数</span>
            <span class="stat-value" id="stat-sets">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">平均 RPE</span>
            <span class="stat-value" id="stat-rpe">--</span>
        </div>
    </div>

    <div class="glass-card right">
        <div class="card-title">热量消耗</div>
        <div class="ring-wrap">
            <div class="ring-progress">
                <svg viewBox="0 0 120 120">
                    <circle class="bg" cx="60" cy="60" r="50"/>
                    <circle class="fg" cx="60" cy="60" r="50"
                        id="cal-ring" stroke-dasharray="314.16" stroke-dashoffset="314.16"/>
                </svg>
                <div class="center-label">
                    <span id="cal-current">0</span>
                    <small>kcal</small>
                </div>
            </div>
        </div>
        <div class="stat-row">
            <span class="stat-label">目标</span>
            <span class="stat-value" id="cal-target">600 kcal</span>
        </div>
    </div>

    <div id="hint-overlay">点击身体部位查看详情</div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
