<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronSync-3D · 智能健身仪表盘</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- ===== Floating neon background orbs (from global.css) ===== -->
    <div id="glass-bg-orb"></div>

    <!-- ===== TOP NAVBAR ===== -->
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> <small class="logo-dot">⏺</small></div>
        <nav>
            <a href="/" class="active">仪表盘</a>
            <a href="/training.html">训练</a>
            <a href="/body-metrics.html">指标</a>
            <a href="/diet-mood.html">饮食</a>
            <a href="/supplements.html">补剂</a>
        </nav>
        <div class="nav-right">
            <span class="nav-user" id="navUser">—</span>
            <button class="btn-logout" id="btnLogout" title="退出登录">↩ 退出</button>
        </div>
    </div>

    <!-- ===== BENTO BOX DASHBOARD ===== -->
    <div class="page-container bento-page">

        <!-- ── Row 1: Greeting (2 cols) + Training (1 col) + Body Metrics (1 col) ── -->
        <div class="bento-grid bento-row-span-2">

            <!-- Card 1: 今日概览 (large, spans 2 rows) + 个人统计 -->
            <div class="bento-card card-greeting" id="cardGreeting">
                <div class="greeting-inner">

                    <!-- Left: greeting -->
                    <div class="greeting-left">
                        <div class="greeting-time" id="greetingTime">--:--</div>
                        <div class="greeting-text" id="greetingText">加载中...</div>
                        <div class="greeting-date" id="greetingDate">——</div>
                        <div class="greeting-mood" id="greetingMood">
                            <span class="mood-label">今天状态</span>
                            <span class="mood-options">
                                <button class="mood-btn" data-score="10" title="非常好">😄</button>
                                <button class="mood-btn" data-score="7" title="还不错">🙂</button>
                                <button class="mood-btn" data-score="5" title="一般般">😐</button>
                                <button class="mood-btn" data-score="2" title="不太好">😞</button>
                            </span>
                            <span class="mood-result" id="moodResult"></span>
                        </div>
                        <div class="greeting-motto">每一次努力，都是对自己的重塑</div>
                    </div>

                    <!-- Right: personal stats -->
                    <div class="greeting-stats" id="profileStats">
                        <div class="stats-identity">
                            <span class="stats-avatar" id="statsAvatar">A</span>
                            <div>
                                <div class="stats-name" id="statsName">—</div>
                            </div>
                        </div>
                        <div class="stats-divider"></div>
                        <div class="stats-grid">
                            <div class="stats-item">
                                <span class="stats-num" id="ps-workouts">--</span>
                                <span class="stats-lbl">训练次数</span>
                            </div>
                            <div class="stats-item">
                                <span class="stats-num" id="ps-sets">--</span>
                                <span class="stats-lbl">总组数</span>
                            </div>
                            <div class="stats-item">
                                <span class="stats-num" id="ps-volume">--</span>
                                <span class="stats-lbl">总容量</span>
                            </div>
                            <div class="stats-item">
                                <span class="stats-num" id="ps-calories">--</span>
                                <span class="stats-lbl">消耗</span>
                            </div>
                        </div>
                        <div class="stats-body" id="statsBodyRow">
                            <!-- filled by JS: weight / bodyfat with deltas -->
                        </div>
                    </div>

                </div>
            </div>

            <!-- Card 2: 核心训练 (medium) -->
            <div class="bento-card card-training" id="cardTraining">
                <div class="card-header">
                    <span class="card-dot"></span>
                    核心力量
                </div>
                <div class="training-metrics">
                    <div class="training-item">
                        <span class="training-label">深蹲</span>
                        <span class="training-value" id="ts-squat">--</span>
                        <span class="training-unit">kg 本周</span>
                    </div>
                    <div class="training-item">
                        <span class="training-label">罗马尼亚硬拉</span>
                        <span class="training-value" id="ts-rdl">--</span>
                        <span class="training-unit">kg 本周</span>
                    </div>
                    <div class="training-item">
                        <span class="training-label">本周训练</span>
                        <span class="training-value" id="ts-frequency">--</span>
                        <span class="training-unit">次</span>
                    </div>
                </div>
                <div class="training-mini-bar" id="trainingMiniBar">
                    <div class="mini-bar-track">
                        <div class="mini-bar-fill" id="miniBarFill" style="width:0%"></div>
                    </div>
                    <span class="mini-bar-label">本周进度</span>
                </div>
            </div>

            <!-- Card 3: 本周容量趋势 (medium) -->
            <div class="bento-card card-capacity" id="cardCapacity">
                <div class="card-header">
                    <span class="card-dot"></span>
                    本周容量趋势
                </div>
                <div class="capacity-bars" id="capacityBars">
                    <!-- filled by JS: 7 day bars -->
                </div>
                <div class="capacity-footer">
                    <span class="capacity-total">本周总容量 <strong id="capTotal">--</strong></span>
                </div>
            </div>

            <!-- Card 4: 补剂余量 (below 核心训练) -->
            <div class="bento-card card-supplement-mini" id="cardSupplements">
                <div class="card-header">
                    <span class="card-dot"></span>
                    补剂余量
                </div>
                <div class="sup-mini-list" id="supMiniList">
                    <div class="sup-mini-placeholder">暂无补剂</div>
                </div>
            </div>

            <!-- Card 5: 今日饮食 (below 容量趋势) -->
            <div class="bento-card card-diet-mini" id="cardDietMood">
                <div class="card-header">
                    <span class="card-dot"></span>
                    今日饮食
                </div>
                <div class="diet-mini-body" id="dietMiniBody">
                    <div class="diet-mini-placeholder">暂无记录</div>
                </div>
            </div>

        </div>

        <!-- ── Row 2: Quick Actions (full width) ── -->
        <div class="bento-grid bento-row-1">

            <!-- Card 6: 快捷操作 (horizontal) -->
            <div class="bento-card card-actions">
                <div class="card-header">
                    <span class="card-dot"></span>
                    快捷操作
                </div>
                <div class="actions-grid">
                    <a href="/training.html" class="action-btn">
                        <span class="action-icon">⌖</span>
                        <span class="action-text">添加训练</span>
                    </a>
                    <a href="/diet-mood.html" class="action-btn">
                        <span class="action-icon">◈</span>
                        <span class="action-text">饮食记录</span>
                    </a>
                    <a href="/body-metrics.html" class="action-btn">
                        <span class="action-icon">◉</span>
                        <span class="action-text">身体指标</span>
                    </a>
                    <a href="/supplements.html" class="action-btn">
                        <span class="action-icon">◇</span>
                        <span class="action-text">补剂管理</span>
                    </a>
                    <a href="/mcp-search.html" class="action-btn">
                        <span class="action-icon">◎</span>
                        <span class="action-text">日记检索</span>
                    </a>
                </div>
            </div>

        </div>

        <!-- ── Row 3: 今日消耗 + 近 7 日消耗趋势 ── -->
        <div class="bento-grid bento-row-bottom">

            <!-- Card 7: 今日消耗 -->
            <div class="bento-card card-calories">
                <div class="card-header">
                    <span class="card-dot"></span>
                    今日消耗
                </div>
                <div class="calories-display">
                    <span class="calories-number" id="calNumber">0</span>
                    <span class="calories-unit">kcal</span>
                </div>
                <div class="calories-bar">
                    <div class="cal-bar-track">
                        <div class="cal-bar-fill" id="calBarFill" style="width:0%"></div>
                    </div>
                    <span class="cal-bar-label" id="calBarLabel">0 / 600 kcal</span>
                </div>
            </div>

            <!-- Card 8: 近 7 日消耗趋势 -->
            <div class="bento-card card-weekly-cal">
                <div class="card-header">
                    <span class="card-dot"></span>
                    近 7 日消耗趋势
                </div>
                <div class="weekly-cal-bars" id="weeklyCalBars">
                    <!-- filled by JS -->
                </div>
                <div class="weekly-cal-footer">
                    <span class="weekly-cal-total">7 日共 <strong id="weeklyCalTotal">--</strong> kcal</span>
                    <span class="weekly-cal-avg">日均 -- kcal</span>
                </div>
            </div>

        </div>

    </div>

    <!-- ===== Toast container ===== -->
    <div class="toast-wrap"></div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
