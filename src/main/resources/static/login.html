<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(33,150,243,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(33,150,243,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            animation: gridPulse 8s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .login-card {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 48px 36px 36px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5),
                        0 0 80px rgba(33,150,243,0.05);
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #E0E0E0;
        }

        .brand h1 span {
            color: #2196F3;
        }

        .brand .sub {
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #9E9E9E;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #E0E0E0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .form-group input:focus {
            border-color: #2196F3;
            box-shadow: 0 0 0 3px rgba(33,150,243,0.15);
        }

        .form-group input::placeholder {
            color: #555;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2196F3, #1976D2);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            margin-top: 8px;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #F44336;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <h1>IRON<span>SYNC</span> 3D</h1>
                <div class="sub">智能健身管理平台</div>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username"
                           placeholder="请输入用户名" value="admin" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password"
                           placeholder="请输入密码" value="123456">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
            </form>

            <div class="error-msg" id="errorMsg"></div>
            <div class="footer">IRONSYNC 3D v1.0</div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
