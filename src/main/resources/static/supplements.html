<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营养与补剂管家 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/supplement.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <style>
        #supplement-chart-container { margin-bottom: 20px; background: #1E1E1E; border-radius: 12px; padding: 16px; }
        #supplementChart { width: 100%; height: 200px; }
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> 3D</div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html">训练记录</a>
            <a href="/supplements.html" class="active">补剂管家</a>
            <a href="/diet-mood.html">饮食情绪</a>
            <a href="/body-metrics.html">身体指标</a>
            <a href="/mcp-search.html">日记检索</a>
            <a href="/test-report.html">测试报告</a>
        </nav>
    </div>

    <div class="page-container">
        <div id="supplement-chart-container">
            <div id="supplementChart"></div>
        </div>
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="搜索补剂名称..." class="search-box">
            <button id="addBtn" class="btn-primary">+ 新增补剂</button>
        </div>
        <div class="card-grid" id="supplementGrid"></div>
    </div>

    <!-- 简易弹窗 -->
    <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3 id="modalTitle">新增补剂</h3>
            <form id="modalForm">
                <input type="hidden" name="id">
                <label>名称
                    <input type="text" name="name" required>
                </label>
                <label>当前库存 (g)
                    <input type="number" name="currentStockG" step="0.01" min="0.01" required>
                </label>
                <label>每日消耗 (g)
                    <input type="number" name="dailyConsumptionG" step="0.01" min="0.01" required>
                </label>
                <div class="modal-actions">
                    <button type="button" id="modalCancel" class="btn-secondary">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/supplement.js"></script>
</body>
</html>
