<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营养与补剂管家 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/supplement.css">
    <script src="js/echarts.min.js"></script>
    <style>
        #supplement-chart-container { margin-bottom: 20px; }
        #supplementChart { width: 100%; height: 200px; }
    </style>
</head>
<body>
    <div id="glass-bg-orb"></div>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> <small class="logo-dot">⏺</small></div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html">训练</a>
            <a href="/body-metrics.html">指标</a>
            <a href="/diet-mood.html">饮食</a>
            <a href="/supplements.html" class="active">补剂</a>
        </nav>
        <div class="nav-right">
            <span class="nav-user" id="navUser">—</span>
            <button class="btn-logout" id="btnLogout" title="退出登录">↩ 退出</button>
        </div>
    </div>

    <div class="page-container">
        <div id="supplement-chart-container">
            <div id="supplementChart"></div>
        </div>
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="搜索补剂名称..." class="search-box">
            <button id="addBtn" class="btn btn-primary">+ 新增补剂</button>
        </div>
        <div class="card-grid" id="supplementGrid"></div>
    </div>

    <!-- 简易弹窗 -->
    <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3 id="modalTitle">新增补剂</h3>
            <form id="modalForm">
                <input type="hidden" name="id">
                <label>名称
                    <input type="text" name="name" required>
                </label>
                <label>当前库存 (g)
                    <input type="number" name="currentStockG" step="0.01" min="0.01" required>
                </label>
                <label>每日消耗 (g)
                    <input type="number" name="dailyConsumptionG" step="0.01" min="0.01" required>
                </label>
                <div class="modal-actions">
                    <button type="button" id="modalCancel" class="btn btn-ghost">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/supplement.js"></script>
</body>
</html>
