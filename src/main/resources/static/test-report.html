<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动化测试报告 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/test-report.css">
</head>
<body>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> 3D</div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html">训练记录</a>
            <a href="/supplements.html">补剂管家</a>
            <a href="/diet-mood.html">饮食情绪</a>
            <a href="/body-metrics.html">身体指标</a>
            <a href="/mcp-search.html">日记检索</a>
            <a href="/test-report.html" class="active">测试报告</a>
        </nav>
    </div>

    <div class="page-container">
        <div class="overview-panel" id="overviewPanel">
            <h3>最近一次测试</h3>
            <div class="badge-list">
                <div class="badge-item">
                    <span class="badge-label">时间</span>
                    <span class="badge-value" id="reportTime">--</span>
                </div>
                <div class="badge-row">
                    <div class="badge status-total">
                        <span class="badge-num" id="totalCount">--</span>
                        <span class="badge-desc">总计</span>
                    </div>
                    <div class="badge status-pass">
                        <span class="badge-num" id="passCount">--</span>
                        <span class="badge-desc">通过</span>
                    </div>
                    <div class="badge status-fail">
                        <span class="badge-num" id="failCount">--</span>
                        <span class="badge-desc">失败</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="report-container">
            <iframe id="reportIframe" src="/test-reports/latest/index.html"
                    onerror="this.style.display='none';document.getElementById('fallbackMsg').style.display='block';"
                    onload="checkIframeLoaded(this)"></iframe>
            <div id="fallbackMsg" class="fallback-msg">
                <div class="fallback-icon">📋</div>
                <div class="fallback-text">暂无测试报告</div>
                <div class="fallback-sub">请执行 CI/CD 部署流水线以生成 Playwright 测试报告</div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/test-report.js"></script>
</body>
</html>
