<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动化测试报告 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/test-report.css">
</head>
<body>
    <div id="glass-bg-orb"></div>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> <small class="logo-dot">⏺</small></div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html">训练</a>
            <a href="/body-metrics.html">指标</a>
            <a href="/diet-mood.html">饮食</a>
            <a href="/supplements.html">补剂</a>
            <a href="/mcp-search.html">日记</a>
        </nav>
        <div class="nav-right">
            <span class="nav-user" id="navUser">—</span>
            <button class="btn-logout" id="btnLogout" title="退出登录">↩ 退出</button>
        </div>
    </div>

    <div class="page-container">
        <div class="stat-row" id="statRow">
            <div class="stat-block block-total">
                <span class="num" id="statTotal">--</span>
                <span class="label">测试用例</span>
                <span class="sub">total</span>
            </div>
            <div class="stat-block block-pass">
                <span class="num" id="statPass">--</span>
                <span class="label">通过</span>
                <span class="sub">passed</span>
            </div>
            <div class="stat-block block-fail">
                <span class="num" id="statFail">--</span>
                <span class="label">失败</span>
                <span class="sub">failed</span>
            </div>
            <div class="stat-block block-time">
                <span class="num" id="statTime">--</span>
                <span class="label">执行耗时</span>
                <span class="sub">duration</span>
            </div>
        </div>

        <div class="console-panel">
            <div class="console-header">
                <span>PIPELINE LOG</span>
                <span class="badge-summary" id="pipelineSummary">waiting...</span>
            </div>
            <div class="console-log" id="consoleLog">
                <div class="log-meta">
                    <span class="meta-key">$</span> <span class="meta-val">初始化测试引擎...</span>
                </div>
            </div>
            <div class="console-summary" id="consoleSummary">
                <span>--</span>
                <span class="verdict">--</span>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/test-report.js"></script>
</body>
</html>
