<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心训练记录 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/training.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <style>
        #volume-chart-container { margin-top: 16px; background: #1E1E1E; border-radius: 12px; padding: 16px; }
        #volumeChart { width: 100%; height: 200px; }
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> 3D</div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html" class="active">训练记录</a>
            <a href="/supplements.html">补剂管家</a>
            <a href="/diet-mood.html">饮食情绪</a>
            <a href="/body-metrics.html">身体指标</a>
            <a href="/mcp-search.html">日记检索</a>
            <a href="/test-report.html">测试报告</a>
        </nav>
    </div>

    <div class="page-container">
        <div id="trend-chart-container">
            <div id="strengthTrendChart"></div>
        </div>

        <div id="volume-chart-container">
            <div id="volumeChart"></div>
        </div>

        <div class="content-grid">
            <div class="form-panel">
                <h3>录入训练记录</h3>
                <form id="trainingForm">
                    <label>动作名称
                        <select name="actionName" required>
                            <option value="">— 请选择 —</option>
                            <option>杠铃深蹲</option>
                            <option>罗马尼亚硬拉</option>
                            <option>卧推</option>
                            <option>推举</option>
                            <option>引体向上</option>
                        </select>
                    </label>
                    <label>重量 (kg)
                        <input type="number" name="weightKg" step="0.5" min="1" max="999" required>
                    </label>
                    <label>组数
                        <input type="number" name="sets" min="1" max="50" required>
                    </label>
                    <label>次数
                        <input type="number" name="reps" min="1" required>
                    </label>
                    <label>RPE
                        <input type="range" name="rpe" min="1" max="10" step="0.5" value="7"
                               oninput="document.getElementById('rpeVal').textContent=this.value">
                        <span id="rpeVal" class="range-val">7</span>
                    </label>
                    <label>日期
                        <input type="date" name="recordDate" required>
                    </label>
                    <button type="submit">提交记录</button>
                </form>
            </div>

            <div class="history-panel">
                <h3>历史记录</h3>
                <div class="table-wrap">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th>日期</th><th>动作</th><th>重量</th><th>组×次</th><th>RPE</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination">
                    <span class="page-info" id="pageInfo"></span>
                    <div class="page-btns">
                        <button class="page-btn" id="prevPage" disabled>‹</button>
                        <span id="pageNumbers"></span>
                        <button class="page-btn" id="nextPage" disabled>›</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/training.js"></script>
</body>
</html>
