<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心训练记录 — IronSync-3D</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/training.css">
    <script src="js/echarts.min.js"></script>
    <style>
        #volume-chart-container { margin-top: 16px; }
        #volumeChart { width: 100%; height: 200px; }
        #strengthTrendChart { width: 100%; height: 280px; }
        #volume-chart-container,
        #trend-chart-container {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: var(--border-w) solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: 18px;
        }
    </style>
</head>
<body>
    <div id="glass-bg-orb"></div>
    <div id="top-bar">
        <div class="logo">IRON<span>SYNC</span> <small class="logo-dot">⏺</small></div>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/training.html" class="active">训练</a>
            <a href="/body-metrics.html">指标</a>
            <a href="/diet-mood.html">饮食</a>
            <a href="/supplements.html">补剂</a>
        </nav>
        <div class="nav-right">
            <span class="nav-user" id="navUser">—</span>
            <button class="btn-logout" id="btnLogout" title="退出登录">↩ 退出</button>
        </div>
    </div>

    <div class="page-container">
        <div id="trend-chart-container">
            <div id="strengthTrendChart"></div>
        </div>

        <div id="volume-chart-container">
            <div class="chart-header">
                <span class="chart-header-title">本周训练容量</span>
                <span class="chart-header-range" id="volumeChartRange"></span>
            </div>
            <div id="volumeChart"></div>
        </div>

        <div class="content-grid">
            <div class="form-panel">
                <h3>录入训练记录</h3>
                <form id="trainingForm">
                    <label>动作名称
                        <div class="action-combo">
                            <select id="actionSelect" class="combo-select">
                                <option value="">— 请选择 —</option>
                                <option>杠铃深蹲</option>
                                <option>罗马尼亚硬拉</option>
                                <option>卧推</option>
                                <option>推举</option>
                                <option>引体向上</option>
                                <option value="__custom__">✎ 自定义输入</option>
                            </select>
                            <input type="text" id="actionInput" class="combo-input" style="display:none"
                                   placeholder="输入动作名称..." maxlength="50">
                            <input type="hidden" name="actionName" id="actionNameHidden">
                        </div>
                    </label>
                    <label id="weightLabel">重量 (kg)
                        <input type="number" name="weightKg" id="weightInput" step="0.5" min="0" max="999" required>
                    </label>
                    <label>组数
                        <input type="number" name="sets" min="1" max="50" required>
                    </label>
                    <label>次数
                        <input type="number" name="reps" min="1" required>
                    </label>
                    <label>RPE
                        <input type="range" name="rpe" min="1" max="10" step="0.5" value="7"
                               oninput="document.getElementById('rpeVal').textContent=this.value">
                        <span id="rpeVal" class="range-val">7</span>
                    </label>
                    <label>日期
                        <input type="date" name="recordDate" required>
                    </label>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="trainingSubmitBtn">提交记录</button>
                        <button type="button" class="btn btn-ghost" id="trainingCancelBtn" style="display:none" onclick="cancelEdit()">取消编辑</button>
                    </div>
                </form>
            </div>

            <div class="history-panel">
                <h3>历史记录</h3>
                <div class="table-wrap">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th>日期</th><th>动作</th><th>重量</th><th>组×次</th><th>RPE</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination">
                    <span class="page-info" id="pageInfo"></span>
                    <div class="page-btns">
                        <button class="page-btn" id="prevPage" disabled>‹</button>
                        <span id="pageNumbers"></span>
                        <button class="page-btn" id="nextPage" disabled>›</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/training.js"></script>
    <script>
    // ---- Action combo box: select + custom input ----
    (function () {
        var select = document.getElementById('actionSelect');
        var input = document.getElementById('actionInput');
        var hidden = document.getElementById('actionNameHidden');
        var form = document.getElementById('trainingForm');
        var weightLabel = document.getElementById('weightLabel');
        var weightInput = document.getElementById('weightInput');

        function updateWeightLabel(action) {
            if (action === '引体向上') {
                weightLabel.innerHTML = '附加负重 (kg)<input type="number" name="weightKg" id="weightInput" step="0.5" min="0" max="999" placeholder="0（自重）">';
            } else {
                weightLabel.innerHTML = '重量 (kg)<input type="number" name="weightKg" id="weightInput" step="0.5" min="0" max="999" required>';
            }
            // Re-bind variable
            weightInput = document.getElementById('weightInput');
        }

        function syncHidden() {
            if (select.value === '__custom__') {
                select.style.display = 'none';
                input.style.display = 'block';
                input.focus();
                hidden.value = input.value;
                updateWeightLabel(input.value);
            } else {
                select.style.display = 'block';
                input.style.display = 'none';
                hidden.value = select.value;
                updateWeightLabel(select.value);
            }
        }

        select.addEventListener('change', syncHidden);
        input.addEventListener('input', function () {
            hidden.value = input.value;
            updateWeightLabel(input.value);
        });

        // Before form submit: if 引体向上 with empty weight, set to 0
        form.addEventListener('submit', function () {
            if (select.value === '__custom__') {
                hidden.value = input.value;
            }
            var action = hidden.value;
            if (action === '引体向上') {
                var w = document.getElementById('weightInput');
                if (!w.value || parseFloat(w.value) === 0 || isNaN(parseFloat(w.value))) {
                    w.value = '0';
                }
            }
        });

        // Reset handler
        var origReset = form.reset.bind(form);
        form.reset = function () {
            origReset();
            select.value = '';
            select.style.display = 'block';
            input.style.display = 'none';
            hidden.value = '';
            updateWeightLabel('');
        };

        // Init
        updateWeightLabel(select.value);
    })();
    </script>
</body>
</html>
